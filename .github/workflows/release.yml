name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu }
          - { os: macos-latest,   target: x86_64-apple-darwin }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95
        with:
          targets: ${{ matrix.target }}
      # Belt-and-suspenders: the repo's rust-toolchain.toml can shadow the action's
      # `targets:` input, so install the target's std explicitly.
      - name: Add rust target
        run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross toolchain (aarch64 linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          {
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc"
            echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc"
            echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++"
          } >> "$GITHUB_ENV"
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p skarn
      - name: Package
        shell: bash
        run: |
          BIN=skarn
          DIR="skarn-${{ matrix.target }}"
          mkdir "$DIR"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/$BIN.exe" "$DIR/"
          else
            cp "target/${{ matrix.target }}/release/$BIN" "$DIR/"
          fi
          cp README.md LICENSE-MIT LICENSE-APACHE "$DIR/"
          tar czf "$DIR.tar.gz" "$DIR"
          # Portable SHA-256: sha256sum on Linux/Windows-bash, shasum on macOS.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$DIR.tar.gz" > "$DIR.tar.gz.sha256"
          else
            shasum -a 256 "$DIR.tar.gz" > "$DIR.tar.gz.sha256"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: skarn-${{ matrix.target }}
          path: |
            skarn-${{ matrix.target }}.tar.gz
            skarn-${{ matrix.target }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
