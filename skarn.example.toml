# Example Skarn gateway configuration.
#
# Copy to `skarn.toml` (or run `skarn init`) and edit. `skarn serve` reads this,
# launches each downstream server, and aggregates them behind the Code Mode
# meta-tools (search / read_tool_docs / execute).

[gateway]
# Also expose the namespaced downstream tools directly (e.g. `fs__read_file`)
# alongside the Code Mode meta-tools. Leave false for maximum token savings.
passthrough = false

# The separator joining <server> and <tool> into a namespaced name. Must match
# the MCP tool-name charset [A-Za-z0-9_.-].
namespace_separator = "__"

