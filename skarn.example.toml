# Example Skarn gateway configuration.
#
# Copy to `skarn.toml` (or run `skarn init`) and edit. `skarn serve` reads this,
# launches each downstream server, and aggregates them behind the Code Mode
# meta-tools (search / read_tool_docs / execute).

[gateway]
# Also expose the namespaced downstream tools directly (e.g. `fs__read_file`)
# alongside the Code Mode meta-tools. Leave false for maximum token savings.
passthrough = false

# The separator joining <server> and <tool> into a namespaced name. Must match
# the MCP tool-name charset [A-Za-z0-9_.-].
namespace_separator = "__"

# How `execute` scripts are isolated:
#   "auto"        – cross-process OS-sandboxed worker when available (macOS/Linux),
#                   otherwise the in-process hermetic isolate (default)
#   "worker"      – always use the sandboxed worker (errors if unavailable)
#   "in_process"  – hermetic isolate only, no extra OS sandbox
isolation = "auto"

# ---------------------------------------------------------------------------
# Downstream MCP servers. Each [servers.<alias>] becomes a namespace prefix.
# ---------------------------------------------------------------------------

[servers.fs]
transport = "stdio"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-filesystem", "/path/to/project"]

[servers.github]
transport = "stdio"
