# Skarn built-in compression rules.
#
# `default` applies to every command. `profiles.<tool>` patches the default for
# a specific tool (matched on the program's base name). Scalar fields override;
# `drop`/`keep` lists are appended. `keep` always beats `drop`, and keep-matching
# lines are rescued from the elided middle when output is truncated.
#
# Regexes use Rust `regex` syntax. Single-quoted YAML keeps backslashes literal.

default:
  strip_ansi: true
  collapse_carriage_returns: true
  collapse_blank_lines: true
  dedupe_consecutive: true
  max_lines: 200
  head_lines: 60
  tail_lines: 40
  max_rescued_lines: 40
  drop: []
  keep:
    - '(?i)\berror\b'
    - '(?i)\bwarning\b'
    - '(?i)\bfailed\b'
    - '(?i)\bpanic'
    - '(?i)\btraceback'

profiles:
  cargo:
    max_lines: 160
    drop:
      - '^\s*Compiling '
      - '^\s*Downloading '
      - '^\s*Downloaded '
      - '^\s*Updating '
      - '^\s*Fresh '
      - '^\s*Finished '
      - '^\s*Blocking waiting'
      - '^\s*Building '
      - '^\s*Installing '
      - '^\s*Adding '
      - '^\s*Locking '
      - '^\s*running \d+ tests?$'
      - '^test .* \.\.\. ok$'
      - '^test result: ok\.'
      - '^\s*Doc-tests'
      - '^\s*$'
    keep:
      - '^error(\[|:)'
      - '^warning:'
      - '\bpanicked\b'
      - '\.\.\. FAILED$'
      - '^test result: FAILED'
      - '^failures:'
      - '^\s*--> '

  rustc:
    drop:
      - '^\s*Compiling '
    keep:
      - '^error'
      - '^warning'

  pytest:
    max_lines: 160
    drop:
      - '^\.+$'
      - '^[.FsxX]+\s+\[\s*\d+%\]$'
      - '(?i)\bPASSED\b'
      - '^platform '
      - '^cachedir:'
      - '^rootdir:'
      - '^plugins:'
      - '^collected '
      - '^\s*$'
    keep:
      - '(?i)\bFAILED\b'
      - '(?i)\bERROR\b'
      - '^E\s+'
      - '^>\s+'
      - '(?i)assert'
      - '^_{3,}.*_{3,}$'
