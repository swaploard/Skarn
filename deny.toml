# cargo-deny configuration. Run: cargo deny check
#
# Enforces the project's "permissive licenses only, no known advisories" policy.

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
# Permissive licenses only. Skarn itself is MIT OR Apache-2.0, and we keep the
# dependency tree free of copyleft so the single binary can be vendored anywhere.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
